<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarniMarket — Login</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥩</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white; border-radius: 16px;
      padding: 40px 32px; width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center; margin-bottom: 28px;
    }
    .logo h1 { font-size: 24px; color: #1a1a1a; }
    .logo p { font-size: 13px; color: #999; margin-top: 4px; }
    .badge {
      background: #c0392b; color: white;
      font-size: 11px; padding: 3px 10px;
      border-radius: 99px; margin-top: 8px;
      display: inline-block;
    }
    label {
      display: block; font-size: 13px;
      font-weight: bold; margin-bottom: 6px;
      color: #333;
    }
    input {
      width: 100%; padding: 12px; border-radius: 8px;
      border: 1px solid #ddd; font-size: 14px;
      margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #c0392b; }
    button {
      width: 100%; padding: 13px;
      background: #c0392b; color: white;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #a93226; }
    .error {
      background: #fdecea; color: #c0392b;
      padding: 10px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🥩 CarniMarket</h1>
      <p>Panel de administración</p>
      <span class="badge">Acceso restringido</span>
    </div>
    <div id="error" class="error">❌ Email o contraseña incorrectos</div>
    <label>Email</label>
    <input type="email" id="email" placeholder="correo@ejemplo.com">
    <label>Contraseña</label>
    <div style="position:relative">
        <input type="password" id="password">
        <button type="button" onclick="this.previousElementSibling.type = this.previousElementSibling.type === 'password' ? 'text' : 'password'" style="position:absolute; right:8px; top:32px; background:none; border:none; cursor:pointer;">👁️</button>
    </div>
    <button onclick="login()">Entrar</button>
    <p style="text-align:center; margin-top:15px;">
        <a href="#" onclick="showRecuperar(); return false;" style="color:#999; font-size:13px;">¿Olvidaste tu contraseña?</a>
    </p>
    <div id="recuperar" style="display:none; margin-top:20px; padding-top:20px; border-top:1px solid #eee;">
        <h3 style="margin-bottom:15px;">Recuperar contraseña</h3>
        <div id="msg-recuperar" class="error" style="display:none; margin-bottom:15px;"></div>
        <label>Tu email</label>
        <input type="email" id="email-recuperar" placeholder="correo@ejemplo.com">
        <button onclick="recuperarContrasena()" style="background:#27ae60;">Enviar enlace de recuperación</button>
    </div>
  </div>

<script>
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const error = document.getElementById("error");

      const res = await fetch("/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({email, password})
      });

      const data = await res.json();

      if (data.token) {
        window.location.href = "/admin";
      } else {
        error.style.display = "block";
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });

    function showRecuperar() {
        document.getElementById("recuperar").style.display = "block";
    }

    async function recuperarContrasena() {
        const email = document.getElementById("email-recuperar").value;
        const msg = document.getElementById("msg-recuperar");
        
        const res = await fetch("/auth/recuperar", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({email})
        });
        
        const data = await res.json();
        msg.style.display = "block";
        msg.style.background = "#e8f5e9";
        msg.style.color = "#2e7d32";
        msg.textContent = "Si el correo existe, recibirás las instrucciones";
    }
</script>
</body>
</html>
