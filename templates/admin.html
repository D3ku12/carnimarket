<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CarniMarket - Admin</title>
    <link rel="stylesheet" href="/static/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>🥩 CarniMarket Admin</h1>
        <div class="nav">
            <button onclick="showTab('dashboard', this)">Dashboard</button>
            <button onclick="showTab('ventas', this)">Ventas</button>
            <button onclick="showTab('deudas', this)">Deudas</button>
            </div>
    </header>

    <div class="container">
        <div id="tab-ventas" class="tab">
            <div class="card">
                <h2>Ventas Realizadas</h2>
                <a href="/admin/exportar/ventas" style="background: #27ae60; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 20px; font-weight: bold;">
                    📊 Descargar Reporte Excel
                </a>
                
                <table>
                    <thead>
                        <tr><th>Fecha</th><th>Cliente</th><th>Total</th><th>Estado</th></tr>
                    </thead>
                    <tbody id="tabla-ventas"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-deudas" class="tab">
            <div class="card">
                <h2>Clientes Pendientes</h2>
                <table>
                    <thead>
                        <tr><th>Cliente</th><th>Deuda</th><th>Acción</th></tr>
                    </thead>
                    <tbody id="tabla-deudas"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="/static/admin.js"></script>
</body>
</html>
