<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarniMarket</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    header {
      background: #c0392b; color: white;
      padding: 20px; text-align: center;
    }
    header h1 { font-size: 28px; }
    header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
    .container { max-width: 700px; margin: 30px auto; padding: 0 16px; }
    .card {
      background: white; border-radius: 12px;
      padding: 20px; margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #c0392b; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #fdf0ee; padding: 10px; text-align: left; color: #c0392b; }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; }
    .badge {
      padding: 3px 10px; border-radius: 99px;
      font-size: 12px; font-weight: bold;
    }
    .ok { background: #e8f5e9; color: #2e7d32; }
    .bajo { background: #fff8e1; color: #f57f17; }
    .agotado { background: #fdecea; color: #c0392b; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; }
    select, input {
      width: 100%; padding: 10px; border-radius: 8px;
      border: 1px solid #ddd; font-size: 14px;
    }
    button {
      width: 100%; padding: 12px; background: #c0392b;
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: bold; cursor: pointer;
    }
    button:hover { background: #a93226; }
    .mensaje {
      padding: 12px; border-radius: 8px;
      font-size: 14px; margin-bottom: 16px; display: none;
    }
    .exito { background: #e8f5e9; color: #2e7d32; }
    .error { background: #fdecea; color: #c0392b; }
  </style>
</head>
<body>

<header>
  <h1>🥩 CarniMarket</h1>
  <p>Sistema de gestión de carnicería</p>
</header>

<div class="container">

  <!-- Registrar venta -->
  <div class="card">
    <h2>Registrar Venta</h2>
    <div id="mensaje" class="mensaje"></div>
    <div class="form-group">
      <label>Producto</label>
      <select id="producto">
        <option value="">Selecciona un producto...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Kilos</label>
      <input type="number" id="kilos" placeholder="Ej: 2.5" step="0.1" min="0.1">
    </div>
    <button onclick="registrarVenta()">Registrar Venta</button>
  </div>

  <!-- Inventario -->
  <div class="card">
    <h2>Inventario Actual</h2>
    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Stock</th>
          <th>Mínimo</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tabla-inventario">
        <tr><td colspan="4">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  // Cargar inventario al abrir
  async function cargarInventario() {
    const res = await fetch("/inventario");
    const data = await res.json();

    const select = document.getElementById("producto");
    const tbody = document.getElementById("tabla-inventario");

    select.innerHTML = '<option value="">Selecciona un producto...</option>';
    tbody.innerHTML = "";

    for (const [nombre, info] of Object.entries(data)) {
      // Llenar select
      if (info.stock > 0) {
        select.innerHTML += `<option value="${nombre}">${nombre} — ${info.stock}kg disponibles</option>`;
      }

      // Llenar tabla
      let estado, clase;
      if (info.stock === 0) {
        estado = "Agotado"; clase = "agotado";
      } else if (info.stock <= info.minimo) {
        estado = "Stock bajo"; clase = "bajo";
      } else {
        estado = "OK"; clase = "ok";
      }

      tbody.innerHTML += `
        <tr>
          <td><strong>${nombre}</strong></td>
          <td>${info.stock}kg</td>
          <td>${info.minimo}kg</td>
          <td><span class="badge ${clase}">${estado}</span></td>
        </tr>`;
    }
  }

  // Registrar venta
  async function registrarVenta() {
    const producto = document.getElementById("producto").value;
    const kilos = parseFloat(document.getElementById("kilos").value);
    const msg = document.getElementById("mensaje");

    if (!producto || !kilos) {
      msg.className = "mensaje error";
      msg.style.display = "block";
      msg.textContent = "❌ Completa todos los campos.";
      return;
    }

    const res = await fetch("/vender", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({producto, kilos})
    });

    const data = await res.json();
    msg.style.display = "block";

    if (data.error) {
      msg.className = "mensaje error";
      msg.textContent = "❌ " + data.error;
    } else {
      msg.className = "mensaje exito";
      msg.textContent = `✅ Venta registrada: ${data.producto} ${data.kilos}kg = $${data.subtotal.toLocaleString()}`;
      document.getElementById("kilos").value = "";
      cargarInventario();
    }
  }

  cargarInventario();
</script>
</body>
</html>
