<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarniMarket</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥩</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    header {
      background: #c0392b; color: white;
      padding: 20px; text-align: center;
    }
    header h1 { font-size: 28px; }
    header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
    .container { max-width: 700px; margin: 30px auto; padding: 0 16px; }
    .card {
      background: white; border-radius: 12px;
      padding: 20px; margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 18px; margin-bottom: 16px; color: #c0392b; }
    .card p { font-size: 14px; color: #666; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #fdf0ee; padding: 10px; text-align: left; color: #c0392b; }
    td { padding: 10px; border-bottom: 1px solid #f0f0f0; }
    .badge {
      padding: 3px 10px; border-radius: 99px;
      font-size: 12px; font-weight: bold;
    }
    .ok { background: #e8f5e9; color: #2e7d32; }
    .bajo { background: #fff8e1; color: #f57f17; }
    .agotado { background: #fdecea; color: #c0392b; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; margin-bottom: 5px; font-weight: bold; }
    .ayuda { font-size: 11px; color: #888; margin-top: 3px; }
    select, input {
      width: 100%; padding: 10px; border-radius: 8px;
      border: 1px solid #ddd; font-size: 14px;
    }
    button {
      width: 100%; padding: 12px; background: #c0392b;
      color: white; border: none; border-radius: 8px;
      font-size: 15px; font-weight: bold; cursor: pointer;
    }
    button:hover { background: #a93226; }
    .mensaje {
      padding: 12px; border-radius: 8px;
      font-size: 14px; margin-bottom: 16px; display: none;
    }
    .exito { background: #e8f5e9; color: #2e7d32; }
    .error { background: #fdecea; color: #c0392b; }
    .precio { color: #c0392b; font-weight: bold; }
    .tipo-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 4px;
    }
    .tipo-kilo { background: #e8f5e9; color: #166534; }
    .tipo-plato { background: #fff8e1; color: #b45309; }
  </style>
</head>
<body>

<header>
  <h1>🥩 CarniMarket</h1>
  <p>Sistema de gestión de carnicería</p>
</header>

<div class="container">

  <!-- Registrar venta -->
  <div class="card">
    <h2>Registrar Venta</h2>
    <p>Selecciona el producto y la cantidad que vas a vender.</p>
    <div id="mensaje" class="mensaje"></div>
    <div class="form-group">
      <label>¿Qué producto vas a vender?</label>
      <select id="producto" onchange="actualizarCampos()">
        <option value="">Selecciona un producto...</option>
      </select>
    </div>
    
    <!-- Campos para productos por kilo -->
    <div id="campo-kilos" class="form-group" style="display:none;">
      <label>¿Cuántos kilos?</label>
      <input type="number" id="kilos" placeholder="Ej: 1.5" step="0.1" min="0.1">
    </div>
    
    <!-- Campos para productos por plato -->
    <div id="campo-platos" class="form-group" style="display:none;">
      <label>¿Cuántos platos?</label>
      <input type="number" id="platos" placeholder="Ej: 2" step="1" min="1">
    </div>
    
    <div id="ayuda-venta" class="ayuda" style="display:none;"></div>
    
    <button onclick="registrarVenta()">Registrar Venta</button>
  </div>

  <!-- Inventario -->
  <div class="card">
    <h2>Inventario Actual</h2>
    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Mín</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tabla-inventario">
        <tr><td colspan="4">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  let inventarioData = {};

  // Actualizar campos según tipo de producto
  function actualizarCampos() {
    const select = document.getElementById("producto");
    const nombre = select.value;
    if (!nombre) {
      document.getElementById("campo-kilos").style.display = "none";
      document.getElementById("campo-platos").style.display = "none";
      document.getElementById("ayuda-venta").style.display = "none";
      return;
    }
    
    const info = inventarioData[nombre];
    const tipo = info.tipo || "kilo";
    
    if (tipo === "plato") {
      document.getElementById("campo-kilos").style.display = "none";
      document.getElementById("campo-platos").style.display = "block";
      document.getElementById("ayuda-venta").style.display = "block";
      document.getElementById("ayuda-venta").textContent = `Precio por plato: $${info.precio_kilo.toLocaleString()}`;
    } else {
      document.getElementById("campo-kilos").style.display = "block";
      document.getElementById("campo-platos").style.display = "none";
      document.getElementById("ayuda-venta").style.display = "block";
      document.getElementById("ayuda-venta").textContent = "Escribe en kilos. Ej: 0.5 = media libra, 1 = un kilo";
    }
  }

  // Cargar inventario al abrir
  async function cargarInventario() {
    const res = await fetch("/inventario");
    const data = await res.json();
    inventarioData = data;

    const select = document.getElementById("producto");
    const tbody = document.getElementById("tabla-inventario");

    select.innerHTML = '<option value="">Selecciona un producto...</option>';
    tbody.innerHTML = "";

    for (const [nombre, info] of Object.entries(data)) {
      const tipo = info.tipo || "kilo";
      const stock = tipo === "plato" ? info.stock + " platos" : info.stock + "kg";
      const precio = tipo === "plato" ? `$${info.precio_kilo.toLocaleString()}/plat` : `$${info.precio_kilo.toLocaleString()}/kg`;
      const tipoBadge = tipo === "plato" ? '<span class="tipo-badge tipo-plato">PLATO</span>' : '<span class="tipo-badge tipo-kilo">KILO</span>';
      
      // Llenar select
      select.innerHTML += `<option value="${nombre}" data-tipo="${tipo}">${nombre} - ${stock} - ${precio}</option>`;

      // Llenar tabla
      let estado, clase;
      if (info.stock === 0) {
        estado = "Agotado"; clase = "agotado";
      } else if (info.stock <= info.minimo) {
        estado = "Bajo"; clase = "bajo";
      } else {
        estado = "OK"; clase = "ok";
      }

      tbody.innerHTML += `
        <tr>
          <td><strong>${nombre}</strong>${tipoBadge}</td>
          <td>${stock}<br><span class="precio">${precio}</span></td>
          <td>${info.minimo}${tipo === "plato" ? "" : "kg"}</td>
          <td><span class="badge ${clase}">${estado}</span></td>
        </tr>`;
    }
  }

  // Registrar venta
  async function registrarVenta() {
    const producto = document.getElementById("producto").value;
    const msg = document.getElementById("mensaje");

    if (!producto) {
      msg.className = "mensaje error";
      msg.style.display = "block";
      msg.textContent = "⚠️ Selecciona un producto.";
      return;
    }

    const info = inventarioData[producto];
    const tipo = info.tipo || "kilo";
    let cantidad = 0;
    let unidad = "kilo";

    if (tipo === "plato") {
      cantidad = parseInt(document.getElementById("platos").value) || 0;
      if (cantidad <= 0) {
        msg.className = "mensaje error";
        msg.style.display = "block";
        msg.textContent = "⚠️ Ingresa la cantidad de platos.";
        return;
      }
      if (cantidad > info.stock) {
        msg.className = "mensaje error";
        msg.style.display = "block";
        msg.textContent = `⚠️ Stock insuficiente. Solo hay ${info.stock} platos.`;
        return;
      }
      unidad = "plato";
    } else {
      cantidad = parseFloat(document.getElementById("kilos").value) || 0;
      if (cantidad <= 0) {
        msg.className = "mensaje error";
        msg.style.display = "block";
        msg.textContent = "⚠️ Ingresa la cantidad en kilos.";
        return;
      }
      if (cantidad > info.stock) {
        msg.className = "mensaje error";
        msg.style.display = "block";
        msg.textContent = `⚠️ Stock insuficiente. Solo hay ${info.stock}kg.`;
        return;
      }
    }

    const res = await fetch("/vender", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        producto: producto,
        cantidad: cantidad,
        unidad: unidad
      })
    });

    const data = await res.json();
    msg.style.display = "block";

    if (data.error) {
      msg.className = "mensaje error";
      msg.textContent = "❌ " + data.error;
    } else {
      const cantidadStr = tipo === "plato" ? `${data.platos} platos` : `${data.kilos}kg`;
      msg.className = "mensaje exito";
      msg.textContent = `✅ Venta registrada: ${data.producto} ${cantidadStr} = $${data.subtotal.toLocaleString()}`;
      document.getElementById("kilos").value = "";
      document.getElementById("platos").value = "";
      cargarInventario();
    }
  }

  cargarInventario();
</script>
</body>
</html>
